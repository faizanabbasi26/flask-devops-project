<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask DevOps Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: #16213e;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,200,255,0.2);
            max-width: 600px;
            width: 90%;
        }
        h1 { color: #00d4ff; font-size: 2em; margin-bottom: 15px; }
        p  { color: #aaa; margin-bottom: 20px; }
        .env-box {
            background: #0f3460;
            padding: 10px 20px;
            border-radius: 8px;
            color: #00ff88;
            font-size: 1.1em;
            margin-bottom: 25px;
            display: inline-block;
        }
        .badges { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .badge {
            background: #0f3460;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Flask DevOps Project</h1>
        <p>Linux + Git + GitHub + Docker + Jenkins se deploy hua hai!</p>
        <div class="env-box">🌍 Environment: {{ environment }}</div>
        <div class="badges">
            <span class="badge">🐧 Linux</span>
            <span class="badge">🐙 Git & GitHub</span>
            <span class="badge">🐳 Docker</span>
            <span class="badge">⚙️ Jenkins</span>
            <span class="badge">🐍 Flask</span>
        </div>
    </div>
</body>
</html>
